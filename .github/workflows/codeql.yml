name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '20 23 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: python
          build-mode: none
        - language: c-cpp
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # CodeQL buildless mode ignores .ino files. 
    # This step temporarily duplicates .ino files as .cpp files so CodeQL can scan them.
    - name: Prepare Arduino files for CodeQL
      if: matrix.language == 'c-cpp'
      run: |
        find . -type f -name "*.ino" | while read -r file; do
          cp "$file" "${file%.ino}.cpp"
          echo "Prepared: ${file%.ino}.cpp"
        done

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
